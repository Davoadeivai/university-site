{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'core:home' %}">صفحه اصلی</a></li>
                <li class="breadcrumb-item"><a href="{% url 'admissions:admissions' %}">پذیرش</a></li>
                <li class="breadcrumb-item active">ثبت درخواست</li>
            </ol>
        </nav>
        <h1 class="page-header-title">ثبت درخواست پذیرش</h1>
    </div>
</div>
<section class="section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8" data-aos="fade-up">
                <div class="uni-card p-5">
                    <h3 class="fw-bold text-primary-uni mb-4"><i class="fas fa-file-alt"></i> فرم درخواست پذیرش</h3>
                    <form method="post">
                        {% csrf_token %}
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">نام *</label>
                                <input type="text" name="first_name" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">نام خانوادگی *</label>
                                <input type="text" name="last_name" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">کد ملی *</label>
                                <input type="text" name="national_id" class="form-control" maxlength="10" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">تاریخ تولد *</label>
                                <input type="date" name="birth_date" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">تلفن *</label>
                                <input type="tel" name="phone" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">ایمیل *</label>
                                <input type="email" name="email" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">مقطع مورد نظر *</label>
                                <select name="degree" class="form-select" required>
                                    <option value="">انتخاب کنید...</option>
                                    <option value="associate">کاردانی</option>
                                    <option value="bachelor">کارشناسی</option>
                                    <option value="master">کارشناسی ارشد</option>
                                    <option value="phd">دکتری</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">رشته مورد علاقه *</label>
                                <input type="text" name="desired_major" class="form-control" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">آدرس *</label>
                                <textarea name="address" class="form-control" rows="3" required></textarea>
                            </div>
                            <div class="col-12">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="agree" required>
                                    <label class="form-check-label" for="agree" style="font-size:14px;">
                                        با <a href="#">قوانین و مقررات</a> دانشگاه موافقم
                                    </label>
                                </div>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn-primary-uni w-100" style="padding:15px;">
                                    <i class="fas fa-paper-plane"></i> ثبت درخواست
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
