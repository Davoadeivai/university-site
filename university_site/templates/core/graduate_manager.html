{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'core:home' %}">صفحه اصلی</a></li>
                <li class="breadcrumb-item"><a href="{% url 'core:graduate_studies' %}">تحصیلات تکمیلی</a></li>
                <li class="breadcrumb-item active">مدیر تحصیلات تکمیلی</li>
            </ol>
        </nav>
        <h1 class="page-header-title">مدیر تحصیلات تکمیلی</h1>
    </div>
</div>

<section class="section">
    <div class="container">
        <div class="dept-card text-center py-5" data-aos="fade-up" style="max-width:560px;margin:0 auto;">
            <div class="rounded-circle d-inline-flex align-items-center justify-content-center border border-4 border-primary shadow mb-3"
                 style="width:140px;height:140px;background:var(--gradient-primary);">
                <i class="fas fa-user-tie text-white" style="font-size:3.5rem;"></i>
            </div>
            <h3 class="fw-bold mb-2">{% if info and info.manager_name %}{{ info.manager_name }}{% else %}خانم ماریا چاری{% endif %}</h3>
            <p class="text-primary fw-semibold mb-0">مدیر تحصیلات تکمیلی</p>
        </div>
        <div class="text-center mt-4">
            <a href="{% url 'core:graduate_studies' %}" class="btn btn-outline-primary">بازگشت به تحصیلات تکمیلی</a>
        </div>
    </div>
</section>
{% endblock %}
