{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'core:home' %}">صفحه اصلی</a></li>
                <li class="breadcrumb-item active">تحصیلات تکمیلی</li>
            </ol>
        </nav>
        <h1 class="page-header-title">تحصیلات تکمیلی</h1>
    </div>
</div>

<section class="section">
    <div class="container">
        <div class="row g-4">
            <div class="col-md-6 col-lg-3" data-aos="fade-up">
                <a href="{% url 'core:graduate_majors' %}" class="quick-link-card">
                    <div class="quick-link-icon"><i class="fas fa-book-open"></i></div>
                    <div class="quick-link-title">رشته ها</div>
                </a>
            </div>
            <div class="col-md-6 col-lg-3" data-aos="fade-up" data-aos-delay="40">
                <a href="{% url 'core:graduate_manager' %}" class="quick-link-card">
                    <div class="quick-link-icon"><i class="fas fa-user-tie"></i></div>
                    <div class="quick-link-title">مدیر تحصیلات تکمیلی</div>
                </a>
            </div>
            <div class="col-md-6 col-lg-3" data-aos="fade-up" data-aos-delay="80">
                <a href="{% url 'core:graduate_news' %}" class="quick-link-card">
                    <div class="quick-link-icon"><i class="fas fa-newspaper"></i></div>
                    <div class="quick-link-title">اخبار تحصیلات تکمیلی</div>
                </a>
            </div>
            <div class="col-md-6 col-lg-3" data-aos="fade-up" data-aos-delay="120">
                <a href="{% url 'core:graduate_regulations' %}" class="quick-link-card">
                    <div class="quick-link-icon"><i class="fas fa-file-alt"></i></div>
                    <div class="quick-link-title">آیین نامه ها و فرمها</div>
                </a>
            </div>
        </div>
        {% if info and info.intro %}
        <div class="dept-card mt-5" data-aos="fade-up">
            <p class="text-muted mb-0" style="font-size:15px;line-height:2.2;">{{ info.intro|linebreaksbr }}</p>
        </div>
        {% endif %}
    </div>
</section>
{% endblock %}
