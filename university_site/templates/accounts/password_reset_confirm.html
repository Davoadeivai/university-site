{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <div class="container">
        <h1 class="page-header-title">تنظیم رمز عبور جدید</h1>
    </div>
</div>
<section class="section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5" data-aos="fade-up">
                <div class="uni-card p-5">
                    <div class="text-center mb-4">
                        <div class="logo-placeholder mx-auto mb-3" style="width:70px;height:70px;font-size:30px;">
                            <i class="fas fa-lock-open"></i>
                        </div>
                        <h3 class="fw-bold text-primary-uni">رمز عبور جدید</h3>
                        <p class="text-muted" style="font-size:14px;">رمز عبور جدید خود را وارد کنید.</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}

                        <!-- رمز عبور جدید + چشمی + نوار قدرت -->
                        <div class="mb-3">
                            <label class="form-label">رمز عبور جدید <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="password" name="password1" id="new-password1"
                                       class="form-control" required placeholder="حداقل ۸ کاراکتر"
                                       oninput="checkStrength(this.value)">
                                <button type="button" class="btn btn-outline-secondary"
                                        onclick="togglePassword('new-password1', this)"
                                        tabindex="-1" title="نمایش/پنهان رمز">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <div class="mt-2">
                                <div style="display:flex;gap:4px;height:6px;border-radius:4px;overflow:hidden;">
                                    <div id="str-bar-1" style="flex:1;background:#e5e7eb;border-radius:4px;transition:background .3s;"></div>
                                    <div id="str-bar-2" style="flex:1;background:#e5e7eb;border-radius:4px;transition:background .3s;"></div>
                                    <div id="str-bar-3" style="flex:1;background:#e5e7eb;border-radius:4px;transition:background .3s;"></div>
                                    <div id="str-bar-4" style="flex:1;background:#e5e7eb;border-radius:4px;transition:background .3s;"></div>
                                </div>
                                <small id="str-label" class="text-muted" style="font-size:12px;"></small>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">تکرار رمز عبور جدید <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="password" name="password2" id="new-password2"
                                       class="form-control" required placeholder="تکرار رمز عبور">
                                <button type="button" class="btn btn-outline-secondary"
                                        onclick="togglePassword('new-password2', this)"
                                        tabindex="-1" title="نمایش/پنهان رمز">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn-primary-uni w-100" style="padding:13px;">
                            <i class="fas fa-check"></i> ذخیره رمز عبور
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
function togglePassword(fieldId, btn) {
    var input = document.getElementById(fieldId);
    var icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}

function checkStrength(val) {
    var score = 0;
    if (val.length >= 8)  score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    var colors = ['', '#ef4444', '#f97316', '#eab308', '#22c55e'];
    var labels = ['', 'خیلی ضعیف', 'ضعیف', 'متوسط', 'قوی'];

    for (var i = 1; i <= 4; i++) {
        document.getElementById('str-bar-' + i).style.background =
            (i <= score) ? colors[score] : '#e5e7eb';
    }

    var lbl = document.getElementById('str-label');
    if (val.length === 0) {
        lbl.textContent = '';
        lbl.style.color = '';
    } else {
        lbl.textContent = 'قدرت رمز: ' + labels[score];
        lbl.style.color = colors[score];
    }
}
</script>
{% endblock %}
