{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <div class="container">
        <h1 class="page-header-title">ورود به سامانه</h1>
    </div>
</div>
<section class="section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6" data-aos="fade-up">
                <div class="uni-card p-5">
                    <div class="text-center mb-4">
                        <div class="logo-placeholder mx-auto mb-3" style="width:70px;height:70px;font-size:30px;">
                            <i class="fas fa-university"></i>
                        </div>
                        <h3 class="fw-bold text-primary-uni">ورود به سامانه</h3>
                        <p class="text-muted" style="font-size:14px;">کد ملی و رمز عبور خود را وارد کنید</p>
                    </div>

                    <form method="post" id="login-form">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="national_id" class="form-label">کد ملی</label>
                            <input type="text" name="national_id" id="national_id" class="form-control"
                                   autofocus required maxlength="10" placeholder="کد ملی ۱۰ رقمی">
                        </div>
                        <div class="mb-4">
                            <label for="login-password" class="form-label">رمز عبور</label>
                            <div class="input-group">
                                <input type="password" name="password" id="login-password"
                                       class="form-control" required placeholder="رمز عبور">
                                <button type="button" class="btn btn-outline-secondary"
                                        onclick="togglePassword('login-password', this)"
                                        tabindex="-1" title="نمایش/پنهان رمز">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary-uni w-100" style="padding:13px;">
                            <i class="fas fa-sign-in-alt"></i> ورود
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="{% url 'accounts:password_reset_request' %}" class="text-muted" style="font-size:13px;">فراموشی رمز عبور</a>
                    </div>
                    <hr class="my-3">
                    <div class="text-center">
                        <span class="text-muted" style="font-size:13px;">حساب کاربری ندارید؟</span>
                        <a href="{% url 'accounts:register' %}" style="font-size:13px;"> ثبت‌نام</a>
                    </div>
                    <div class="text-center mt-2">
                        <span class="text-muted" style="font-size:12px;">اساتید، مدیران و کارکنان با همین فرم و نام کاربری سازمانی خود وارد می‌شوند.</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
function togglePassword(fieldId, btn) {
    var input = document.getElementById(fieldId);
    var icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
{% endblock %}
