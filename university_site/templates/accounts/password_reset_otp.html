{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <div class="container">
        <h1 class="page-header-title">تأیید کد پیامکی</h1>
    </div>
</div>
<section class="section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5" data-aos="fade-up">
                <div class="uni-card p-5">
                    <div class="text-center mb-4">
                        <div class="logo-placeholder mx-auto mb-3" style="width:70px;height:70px;font-size:30px;background:#f0fdf4;color:#22c55e;">
                            <i class="fas fa-mobile-alt"></i>
                        </div>
                        <h3 class="fw-bold text-primary-uni">کد تأیید پیامکی</h3>
                        <p class="text-muted" style="font-size:14px;">
                            کد ۶ رقمی ارسال‌شده به شماره
                            <strong dir="ltr">{{ masked_phone }}</strong>
                            را وارد کنید
                        </p>
                    </div>

                    <form method="post">
                        {% csrf_token %}

                        <!-- کد OTP -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">کد تأیید <span class="text-danger">*</span></label>
                            <input type="text" name="otp_code" id="otp_code"
                                   class="form-control text-center fw-bold"
                                   maxlength="6" pattern="\d{6}" inputmode="numeric"
                                   autofocus placeholder="_ _ _ _ _ _"
                                   style="font-size:28px;letter-spacing:10px;dir:ltr;text-align:center;">
                            <div class="form-text text-muted text-center" style="font-size:12px;" id="otp-timer">
                                این کد <span id="countdown">۱۰:۰۰</span> اعتبار دارد
                            </div>
                        </div>

                        <hr class="my-3">

                        <!-- رمز عبور جدید -->
                        <p class="fw-bold mb-3" style="font-size:14px;color:#57606a;">رمز عبور جدید خود را وارد کنید:</p>

                        <div class="mb-3">
                            <label class="form-label">رمز عبور جدید <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="password" name="password1" id="new-password1"
                                       class="form-control" required placeholder="حداقل ۸ کاراکتر"
                                       oninput="checkStrength(this.value)">
                                <button type="button" class="btn btn-outline-secondary"
                                        onclick="togglePassword('new-password1', this)"
                                        tabindex="-1" title="نمایش/پنهان رمز">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <div class="mt-2">
                                <div style="display:flex;gap:4px;height:6px;border-radius:4px;overflow:hidden;">
                                    <div id="str-bar-1" style="flex:1;background:#e5e7eb;border-radius:4px;transition:background .3s;"></div>
                                    <div id="str-bar-2" style="flex:1;background:#e5e7eb;border-radius:4px;transition:background .3s;"></div>
                                    <div id="str-bar-3" style="flex:1;background:#e5e7eb;border-radius:4px;transition:background .3s;"></div>
                                    <div id="str-bar-4" style="flex:1;background:#e5e7eb;border-radius:4px;transition:background .3s;"></div>
                                </div>
                                <small id="str-label" class="text-muted" style="font-size:12px;"></small>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">تکرار رمز عبور جدید <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="password" name="password2" id="new-password2"
                                       class="form-control" required placeholder="تکرار رمز عبور">
                                <button type="button" class="btn btn-outline-secondary"
                                        onclick="togglePassword('new-password2', this)"
                                        tabindex="-1" title="نمایش/پنهان رمز">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn-primary-uni w-100" style="padding:13px;">
                            <i class="fas fa-check"></i> تأیید کد و تغییر رمز عبور
                        </button>
                    </form>

                    <hr class="my-3">
                    <div class="text-center">
                        <a href="{% url 'accounts:password_reset_request' %}" class="text-muted" style="font-size:13px;">
                            <i class="fas fa-arrow-right"></i> ارسال مجدد کد
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
// تایمر شمارش معکوس ۱۰ دقیقه
(function() {
    var total = 10 * 60;
    var el = document.getElementById('countdown');
    var timer = setInterval(function() {
        total--;
        if (total <= 0) {
            clearInterval(timer);
            el.textContent = 'منقضی شد';
            el.style.color = '#ef4444';
            return;
        }
        var m = Math.floor(total / 60);
        var s = total % 60;
        el.textContent = (m < 10 ? '۰' : '') + toPersianNum(m) + ':' + (s < 10 ? '۰' : '') + toPersianNum(s);
    }, 1000);

    function toPersianNum(n) {
        return String(n).replace(/\d/g, function(d) {
            return '۰۱۲۳۴۵۶۷۸۹'[d];
        });
    }
})();

function togglePassword(fieldId, btn) {
    var input = document.getElementById(fieldId);
    var icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}

function checkStrength(val) {
    var score = 0;
    if (val.length >= 8)  score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    var colors = ['', '#ef4444', '#f97316', '#eab308', '#22c55e'];
    var labels = ['', 'خیلی ضعیف', 'ضعیف', 'متوسط', 'قوی'];
    for (var i = 1; i <= 4; i++) {
        document.getElementById('str-bar-' + i).style.background = (i <= score) ? colors[score] : '#e5e7eb';
    }
    var lbl = document.getElementById('str-label');
    if (val.length === 0) { lbl.textContent = ''; lbl.style.color = ''; }
    else { lbl.textContent = 'قدرت رمز: ' + labels[score]; lbl.style.color = colors[score]; }
}
</script>
{% endblock %}
